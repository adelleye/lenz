openapi: 3.0.0
info:
  title: Lenz Core Corebanking
  version: 1.0.0
  description: >
    OpenAPI source for the current Lenz Core transaction-spine HTTP surface.
    The mock endpoints are demo-only and remain gated by application config.
tags:
  - name: Corebanking
    description: Accounts, balances, transfers, ledger journals, and demo transfer-spine routes.

paths:
  /api/v1/demo/seed:
    post:
      operationId: seedDemo
      summary: Seed demo transaction-spine data
      tags: [Corebanking]
      responses:
        "200":
          description: Demo data seed result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APISeedResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/customers:
    post:
      operationId: createCustomer
      summary: Create a customer inside an institution branch
      tags: [Corebanking]
      parameters:
        - $ref: "#/components/parameters/InstitutionID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerRequest"
      responses:
        "201":
          description: Created customer.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APICustomer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/customers/{customer_id}:
    get:
      operationId: getCustomer
      summary: Get a customer inside an institution
      tags: [Corebanking]
      parameters:
        - $ref: "#/components/parameters/InstitutionID"
        - name: customer_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Customer record.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APICustomer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/customers/{customer_id}/accounts:
    get:
      operationId: listCustomerAccounts
      summary: List accounts owned by a customer inside an institution
      tags: [Corebanking]
      parameters:
        - $ref: "#/components/parameters/InstitutionID"
        - name: customer_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Customer account list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/APIAccount"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "400":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/accounts:
    post:
      operationId: createAccount
      summary: Create a customer deposit account
      tags: [Corebanking]
      parameters:
        - $ref: "#/components/parameters/InstitutionID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountRequest"
      responses:
        "201":
          description: Created account.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIAccount"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/accounts/{account_id}:
    get:
      operationId: getAccount
      summary: Get an account inside an institution
      tags: [Corebanking]
      parameters:
        - $ref: "#/components/parameters/InstitutionID"
        - name: account_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Account record.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIAccount"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/accounts/{account_id}/balance:
    get:
      operationId: getAccountBalance
      summary: Get account ledger and available balances
      tags: [Corebanking]
      parameters:
        - $ref: "#/components/parameters/InstitutionID"
        - name: account_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Account balance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIAccountBalance"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/accounts/{account_id}/freeze:
    post:
      operationId: freezeAccount
      summary: Freeze an active or post-no-debit account
      tags: [Corebanking]
      parameters:
        - $ref: "#/components/parameters/InstitutionID"
        - name: account_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountControlRequest"
      responses:
        "200":
          description: Frozen account.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIAccount"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/accounts/{account_id}/unfreeze:
    post:
      operationId: unfreezeAccount
      summary: Unfreeze a frozen account
      tags: [Corebanking]
      parameters:
        - $ref: "#/components/parameters/InstitutionID"
        - name: account_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountControlRequest"
      responses:
        "200":
          description: Active account.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIAccount"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/accounts/{account_id}/post-no-debit:
    post:
      operationId: activatePostNoDebit
      summary: Activate post-no-debit on an active account
      tags: [Corebanking]
      parameters:
        - $ref: "#/components/parameters/InstitutionID"
        - name: account_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountControlRequest"
      responses:
        "200":
          description: Post-no-debit account.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIAccount"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      operationId: deactivatePostNoDebit
      summary: Deactivate post-no-debit on a post-no-debit account
      tags: [Corebanking]
      parameters:
        - $ref: "#/components/parameters/InstitutionID"
        - name: account_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountControlRequest"
      responses:
        "200":
          description: Active account.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIAccount"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/accounts/{account_id}/liens:
    post:
      operationId: placeAccountLien
      summary: Place an operational lien on an account
      tags: [Corebanking]
      parameters:
        - $ref: "#/components/parameters/InstitutionID"
        - name: account_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountLienRequest"
      responses:
        "200":
          description: Active lien.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIAccountHold"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/accounts/{account_id}/liens/{lien_id}:
    delete:
      operationId: releaseAccountLien
      summary: Release an operational lien
      tags: [Corebanking]
      parameters:
        - $ref: "#/components/parameters/InstitutionID"
        - name: account_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: lien_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReleaseLienRequest"
      responses:
        "200":
          description: Released lien.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIAccountHold"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/accounts/{account_id}/transactions:
    get:
      operationId: listAccountTransactions
      summary: List ledger-backed account transactions
      tags: [Corebanking]
      parameters:
        - $ref: "#/components/parameters/InstitutionID"
        - name: account_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
          description: Maximum number of transactions to return. Non-positive values use the 100 default, and values above 200 are capped.
        - name: before_created_at
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Return transactions created before this timestamp, ordered newest first.
        - name: before_transfer_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Optional tie-breaker cursor used with before_created_at for stable newest-first pagination.
      responses:
        "200":
          description: Account transaction history.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/APITransaction"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "400":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/internal/credits:
    post:
      operationId: createInternalCredit
      summary: Credit a customer account from an internal source account
      tags: [Corebanking]
      parameters:
        - $ref: "#/components/parameters/InstitutionID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InternalCreditRequest"
      responses:
        "200":
          description: Internal credit transfer record.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APITransfer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/internal/debits:
    post:
      operationId: createInternalDebit
      summary: Debit a customer account into an internal destination account
      tags: [Corebanking]
      parameters:
        - $ref: "#/components/parameters/InstitutionID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InternalDebitRequest"
      responses:
        "200":
          description: Internal debit transfer record.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APITransfer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/internal/transfers:
    post:
      operationId: createInternalTransfer
      summary: Transfer money between two customer accounts in the same institution
      tags: [Corebanking]
      parameters:
        - $ref: "#/components/parameters/InstitutionID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InternalTransferRequest"
      responses:
        "200":
          description: Internal transfer record.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APITransfer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/transfers/mock/inbound:
    post:
      operationId: mockInboundTransfer
      summary: Record a mock inbound provider transfer event
      tags: [Corebanking]
      parameters:
        - $ref: "#/components/parameters/InstitutionID"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MockTransferRequest"
      responses:
        "200":
          description: Transfer record.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APITransfer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/transfers/mock/outbound:
    post:
      operationId: mockOutboundTransfer
      summary: Initiate a mock outbound provider transfer
      tags: [Corebanking]
      parameters:
        - $ref: "#/components/parameters/InstitutionID"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MockTransferRequest"
      responses:
        "200":
          description: Transfer record.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APITransfer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/transfers/{transfer_id}:
    get:
      operationId: getTransfer
      summary: Get a transfer by ID
      tags: [Corebanking]
      parameters:
        - $ref: "#/components/parameters/InstitutionID"
        - name: transfer_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Transfer record.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APITransfer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/transfers/{transfer_id}/reverse:
    post:
      operationId: reverseTransfer
      summary: Reverse a succeeded transfer as a new ledger event
      tags: [Corebanking]
      parameters:
        - $ref: "#/components/parameters/InstitutionID"
        - $ref: "#/components/parameters/IdempotencyKey"
        - name: transfer_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Reversal transfer record.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APITransfer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/admin/ledger/journal/{journal_entry_id}:
    get:
      operationId: getJournal
      summary: Inspect a journal entry and postings
      tags: [Corebanking]
      parameters:
        - $ref: "#/components/parameters/InstitutionID"
        - name: journal_entry_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Journal entry with postings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIJournalWithPostings"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/admin/transfers:
    get:
      operationId: listTransfers
      summary: List recent institution transfers
      tags: [Corebanking]
      parameters:
        - $ref: "#/components/parameters/InstitutionID"
      responses:
        "200":
          description: Recent transfers.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/APITransfer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "400":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/InternalServerError"

components:
  parameters:
    InstitutionID:
      name: X-Institution-ID
      in: header
      required: false
      description: Optional consistency check. Protected handlers derive institution scope from the authenticated principal.
      schema:
        type: string
        format: uuid
        minLength: 1
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 1

  responses:
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Missing or invalid authenticated principal.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Authenticated principal is not allowed for the requested institution scope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource was not found or the demo route is disabled.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Request conflicts with existing transfer state or idempotency state.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnprocessableEntity:
      description: Request is valid but cannot be applied.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalServerError:
      description: Unexpected server error. Includes request_id when available.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          minLength: 1
        request_id:
          type: string
          minLength: 1

    CreateCustomerRequest:
      type: object
      required: [branch_id, customer_type]
      properties:
        branch_id:
          type: string
          format: uuid
        customer_type:
          type: string
          enum: [individual, business]
        first_name:
          type: string
          minLength: 1
        last_name:
          type: string
          minLength: 1
        business_name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
          minLength: 1
        phone:
          type: string
          minLength: 1

    CreateAccountRequest:
      type: object
      required: [customer_id, account_number, name]
      properties:
        customer_id:
          type: string
          format: uuid
        account_number:
          type: string
          pattern: "^[0-9]{10}$"
        name:
          type: string
          minLength: 1
        product_type:
          type: string
          enum: [standard_wallet, standard_savings, standard_current]
          default: standard_wallet
        currency_id:
          type: string
          minLength: 3
