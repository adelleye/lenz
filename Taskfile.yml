version: "3"

dotenv: ['.env']

tasks:
  generate:
    desc: Generate OpenAPI-backed Go code.
    cmds:
      - go generate ./apps/core/internal/corebanking

  build:
    desc: Generate code, then build the Go workspace packages.
    deps: [generate]
    cmds:
      - go build ./apps/core/... ./apps/auth/... ./packages/shared/...

  docker_up:
    cmds:
      - docker compose -f infra/docker/docker-compose.yml up -d postgres redis

  run_core:
    cmds:
      - go run -gcflags="-N -l" ./apps/core
  
  migration_run_up:
    cmds:
      - ./scripts/migrate.sh up
  
  migration_run_down:
    cmds:
      - ./scripts/migrate.sh down

  test:
    deps: [generate]
    cmds:
      - go test ./apps/core/... ./apps/auth/... ./packages/shared/...

  demo_transfer_spine:
    deps: [generate]
    cmds:
      - ./scripts/demo_transfer_spine.sh
